name: repo-labeler

on:
    pull_request_target:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review

permissions:
    contents: read
    pull-requests: write

jobs:
    label-pull-requests:
        name: Apply PR labels
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Apply labels from config
              uses: actions/labeler@v6
              with:
                  configuration-path: .github/labeler.yml
                  sync-labels: true
