name: publish-n-release

on:
    push:
        branches:
            - main
            - next

permissions:
    contents: write
    id-token: write
    pull-requests: write

concurrency:
    group: publish-${{ github.ref_name }}
    cancel-in-progress: false

jobs:
    checks:
        uses: ./.github/workflows/checks.yml
        secrets: inherit

    cross-runtime:
        uses: ./.github/workflows/cross-runtime.yml
        secrets: inherit

    preflight:
        needs: [checks]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        outputs:
            run: ${{ steps.preflight.outputs.run }}
            publish_jsr: ${{ steps.preflight.outputs.publish_jsr }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Setup workspace
              uses: ./.github/actions/setup
            - name: Release preflight
              id: preflight
              run: pnpm tsx scripts/release-preflight.ts
              env:
                  GITHUB_REF_NAME: ${{ github.ref_name }}

    dry-run-npm:
        needs: [preflight]
        if: ${{ needs.preflight.outputs.run == 'true' || needs.preflight.outputs.publish_jsr == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Setup workspace
              uses: ./.github/actions/setup
            - name: Publish package (dry run)
              run: pnpm publish --dry-run --no-git-checks
              working-directory: packages/envapt

    dry-run-jsr:
        needs: [preflight]
        if: ${{ needs.preflight.outputs.run == 'true' || needs.preflight.outputs.publish_jsr == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Setup workspace
              uses: ./.github/actions/setup
            - name: Setup Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
              with:
                  deno-version: 2.7.14
            - name: Deno publish dry run
              uses: ./.github/actions/deno-publish-all
              with:
                  search-root: packages
                  dry-run: 'true'

    npm-publish:
        needs: [preflight, cross-runtime, dry-run-npm, dry-run-jsr]
        if: >-
            ${{ !cancelled()
            && needs.preflight.outputs.run == 'true'
            && needs.cross-runtime.result == 'success'
            && needs.dry-run-npm.result == 'success'
            && needs.dry-run-jsr.result == 'success' }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: write
            id-token: write
            pull-requests: write
            actions: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Turbo cache
              uses: ./.github/actions/turbo-cache
              with:
                  turbo_token: ${{ secrets.TURBO_TOKEN }}
                  turbo_team: ${{ vars.TURBO_TEAM }}
                  enable_fallback_cache: 'true'
            - name: Setup workspace
              uses: ./.github/actions/setup
              with:
                  registry-url: https://registry.npmjs.org
            - name: Update npm to latest
              run: npm i -g npm@latest
            - name: Check Node.js and npm versions
              run: node -v && npm -v
            - name: Check npm registry and ping
              run: npm config get registry && npm ping
            - name: Determine release metadata
              id: release_meta
              uses: ./.github/actions/release-metadata
            - name: Run prepublishOnly script
              run: pnpm run prepublishOnly
            - name: Run changesets
              uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
              with:
                  version: pnpm run release:version
                  publish: pnpm run release
                  branch: ${{ github.ref_name }}
                  commit: 'chore: merge changesets'
                  title: ${{ steps.release_meta.outputs.title }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: 0

    jsr-publish:
        needs: [preflight, cross-runtime, dry-run-npm, dry-run-jsr]
        if: >-
            ${{ !cancelled()
            && needs.preflight.outputs.publish_jsr == 'true'
            && needs.cross-runtime.result == 'success'
            && needs.dry-run-npm.result == 'success'
            && needs.dry-run-jsr.result == 'success' }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Setup workspace
              uses: ./.github/actions/setup
            - name: Setup Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
              with:
                  deno-version: 2.7.14
                  cache: true
            - name: Publish to JSR
              uses: ./.github/actions/deno-publish-all
              with:
                  search-root: packages
