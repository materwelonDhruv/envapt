name: publish-n-release

on:
    workflow_run:
        workflows: ['checks']
        types: [completed]
        branches:
            - main
            - next

permissions:
    contents: write
    id-token: write
    pull-requests: write

# Serialize publishes per channel; never cancel an in-flight publish.
concurrency:
    group: publish-${{ github.event.workflow_run.head_branch }}
    cancel-in-progress: false

jobs:
    dry-run-npm:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.workflow_run.head_branch }}
                  fetch-depth: 0
            - name: Setup pnpm
              uses: pnpm/action-setup@v6
            - name: Setup Node.js
              run: pnpm install --frozen-lockfile
            - name: Publish package (dry run)
              run: pnpm publish --dry-run --no-git-checks

    dry-run-jsr:
        # JSR has no prerelease channel, so it is validated and published for stable (main) only.
        if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.workflow_run.head_branch }}
                  fetch-depth: 0

            - uses: pnpm/action-setup@v6
            - run: pnpm install --frozen-lockfile
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: 2.7.14
            - name: Deno publish dry run
              uses: ./.github/actions/deno-publish-all
              with:
                  search-root: packages
                  dry-run: 'true'

    npm-publish:
        needs: [dry-run-npm, dry-run-jsr]
        # dry-run-jsr is skipped on the next channel. !cancelled() forces this job to evaluate
        # its result checks instead of auto-skipping because a dependency was skipped.
        if: >-
            ${{ !cancelled()
            && github.event.workflow_run.conclusion == 'success'
            && needs.dry-run-npm.result == 'success'
            && (needs.dry-run-jsr.result == 'success' || needs.dry-run-jsr.result == 'skipped') }}
        runs-on: ubuntu-latest
        outputs:
            published: ${{ steps.changesets.outputs.published }}
        permissions:
            contents: write
            id-token: write
            pull-requests: write
            actions: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.workflow_run.head_branch }}
                  fetch-depth: 0

            # Hard stop against publishing the wrong channel: next must be in changeset
            # pre-mode (so versions are -next.N and the dist-tag is `next`), main must not be
            # (so a stray pre.json can never overwrite the `latest` tag).
            - name: Guard release channel
              run: |
                  branch="${{ github.event.workflow_run.head_branch }}"
                  mode="$(jq -r '.mode // "exit"' .changeset/pre.json 2>/dev/null || echo exit)"
                  echo "branch=$branch pre-mode=$mode"
                  if [ "$branch" = "next" ] && [ "$mode" != "pre" ]; then
                      echo "::error::next must be in changeset pre-mode (pre.json mode=pre); got '$mode'. Refusing to publish."
                      exit 1
                  fi
                  if [ "$branch" = "main" ] && [ "$mode" = "pre" ]; then
                      echo "::error::main must not be in pre-mode. Refusing to publish a prerelease to the latest tag."
                      exit 1
                  fi

            - name: Turbo cache
              uses: ./.github/actions/turbo-cache
              with:
                  turbo_token: ${{ secrets.TURBO_TOKEN }}
                  turbo_team: ${{ vars.TURBO_TEAM }}
                  enable_fallback_cache: 'true'

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24.16.0
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Update npm to latest
              run: npm i -g npm@latest
            - name: Check Node.js and npm versions
              run: node -v && npm -v
            - name: Check npm registry and ping
              run: npm config get registry && npm ping
            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Determine release metadata
              id: release_meta
              uses: ./.github/actions/release-metadata

            - name: Run prepublishOnly script
              run: pnpm run prepublishOnly

            - name: Run changesets
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm run release:version
                  publish: pnpm run release
                  commit: 'chore: merge changesets'
                  title: ${{ steps.release_meta.outputs.title }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: 0

    jsr-publish:
        needs: [npm-publish]
        if: ${{ needs.npm-publish.outputs.published == 'true' && github.event.workflow_run.head_branch == 'main' }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.workflow_run.head_branch }}
                  fetch-depth: 0
            - name: Setup pnpm
              uses: pnpm/action-setup@v6
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: 2.7.14
                  cache: true
            - name: Publish to JSR
              uses: ./.github/actions/deno-publish-all
              with:
                  search-root: packages
