name: checks

on:
    workflow_call:
    pull_request:
        types: [opened, reopened, synchronize, ready_for_review]
        paths-ignore:
            - '**/*.md'
            - '.vscode/**'
            - '.changeset/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/PULL_REQUEST_TEMPLATE.md'
    push:
        branches-ignore: [main, next]
        paths-ignore:
            - '**/*.md'
            - '.vscode/**'
            - '.changeset/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
    group: checks-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    run-checks:
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Turbo cache
              uses: ./.github/actions/turbo-cache
              with:
                  turbo_token: ${{ secrets.TURBO_TOKEN }}
                  turbo_team: ${{ vars.TURBO_TEAM }}
                  enable_fallback_cache: 'true'
            - name: Setup workspace
              uses: ./.github/actions/setup
            - name: Build project
              run: pnpm build
            - name: Verify portable builds are node-free
              run: pnpm --filter envapt build:verify
            - name: Run type check
              run: pnpm tc
            - name: Check formatting
              run: pnpm fmt:check
            - name: Run lint
              run: pnpm lint
            - name: Run tests
              run: pnpm test
            - name: Run tsc-emit decorator guard
              run: pnpm --filter envapt test:tsc-emit
            - name: Run stage3-emit decorator guard
              run: pnpm --filter envapt test:stage3-emit
            - name: Run audit
              run: pnpm audit --audit-level=high
