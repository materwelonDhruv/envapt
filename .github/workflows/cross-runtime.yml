name: cross-runtime

on:
    workflow_call:
    pull_request:
        paths-ignore:
            - '**/*.md'
            - '.vscode/**'
            - '.changeset/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
    group: cross-runtime-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build dist artifact
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 1
            - name: Setup workspace
              uses: ./.github/actions/setup
            - run: pnpm --filter envapt build
            - uses: actions/upload-artifact@v4
              with:
                  name: envapt-dist-and-suites
                  compression-level: 0
                  path: |
                      packages/envapt/dist/
                      packages/envapt/tests/integration/
                  if-no-files-found: error

    test-node:
        name: node ${{ matrix.node }} / ${{ matrix.os }}
        needs: build
        runs-on: ${{ matrix.os }}
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { node: '20', os: ubuntu-latest }
                    - { node: '22', os: ubuntu-latest }
                    - { node: '24', os: ubuntu-latest }
                    - { node: '22', os: macos-latest }
                    - { node: '22', os: windows-latest }
        steps:
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
            - uses: actions/download-artifact@v4
              with:
                  name: envapt-dist-and-suites
                  path: packages/envapt/
            - run: node packages/envapt/tests/integration/run.mjs

    test-bun:
        name: bun / ubuntu
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: 1.3.x
            - uses: actions/download-artifact@v4
              with:
                  name: envapt-dist-and-suites
                  path: packages/envapt/
            - run: bun packages/envapt/tests/integration/run.mjs

    test-deno:
        name: deno / ubuntu
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
              with:
                  deno-version: v2.7.x
            - uses: actions/download-artifact@v4
              with:
                  name: envapt-dist-and-suites
                  path: packages/envapt/
            - run: deno run -A --config packages/envapt/tests/integration/deno.json packages/envapt/tests/integration/run.mjs

    test-workerd:
        name: workerd
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 1
            - name: Setup workspace
              uses: ./.github/actions/setup
            - run: pnpm --filter envapt build
            - run: pnpm --filter envapt test:workers

    test-browser:
        name: browser
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 1
            - name: Setup workspace
              uses: ./.github/actions/setup
            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
            - run: pnpm --filter envapt exec playwright install --with-deps chromium
            - run: pnpm --filter envapt build
            - run: pnpm --filter envapt test:browser

    test-consumer-build:
        name: consumer-build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 1
            - name: Setup workspace
              uses: ./.github/actions/setup
            - run: pnpm --filter envapt build
            - run: pnpm --filter envapt test:consumer-build

    cross-runtime-ok:
        name: cross-runtime ok
        needs: [test-node, test-bun, test-deno, test-workerd, test-browser, test-consumer-build]
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Verify every runtime job succeeded
              run: |
                  results='${{ toJSON(needs) }}'
                  echo "$results"
                  failed=$(echo "$results" | jq -r 'to_entries[] | select(.value.result != "success") | .key')
                  if [ -n "$failed" ]; then
                      echo "Failed jobs:"
                      echo "$failed"
                      exit 1
                  fi
                  echo "All cross-runtime jobs succeeded."
